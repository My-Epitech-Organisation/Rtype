# =============================================================================
# R-Type Test Level - For Map/Level System Testing
# =============================================================================
# A test level demonstrating the data-driven map/level system
#
# NOTE: Texture names must match textures loaded in AssetManager:
#   - "bg_menu", "bg_planet_1", "bg_planet_2", "bg_planet_3"
#   - "astro_vessel", "player_vessel"
# For obstacles/tiles, leave sprite empty or use existing textures as placeholders
# until dedicated textures are added to assets/

[level]
id = "test_level"
name = "Test Level"
background = "bg_menu"
scroll_speed = 100.0

# Map configuration
[map]
level_width = 5000.0
viewport_width = 1920.0
viewport_height = 1080.0

# -----------------------------------------------------------------------------
# Starfield Background Layers (for parallax effect)
# -----------------------------------------------------------------------------
# Layers are rendered back-to-front based on z_index (lower = further back)
# Using existing textures: "bg_planet_1", "bg_planet_2", "bg_planet_3"

[[starfield]]
id = "stars_far"
texture = "bg_planet_1"
scroll_factor = 0.2
z_index = -100
repeating = true
scale = 1.0

[[starfield]]
id = "stars_medium"
texture = "bg_planet_2"
scroll_factor = 0.5
z_index = -50
repeating = true
scale = 1.0

[[starfield]]
id = "nebula"
texture = "bg_planet_3"
scroll_factor = 0.8
z_index = -25
repeating = true
scale = 1.0

